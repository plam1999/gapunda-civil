<!DOCTYPE html>
<html lang="en-AU" class="scroll-smooth" data-base="./">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#E8731A">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <title>Project | Gapunda Civil Construction</title>
  <meta name="description" content="View our civil construction project details. Gapunda Civil Construction delivers concrete works, civil infrastructure, and plant hire across the Northern Territory.">
  <meta name="author" content="Gapunda Civil Construction">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Gapunda Civil Construction">
  <meta property="og:image" content="https://plam1999.github.io/gapunda-civil/assets/images/company-logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="./assets/images/company-logo.png" type="image/png">
  <link rel="apple-touch-icon" href="./assets/images/company-logo.png">
  <link rel="manifest" href="./manifest.json">

  <!-- BreadcrumbList schema (populated dynamically below for SEO) -->
  <script type="application/ld+json" id="breadcrumb-schema">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://plam1999.github.io/gapunda-civil/" },
      { "@type": "ListItem", "position": 2, "name": "Projects", "item": "https://plam1999.github.io/gapunda-civil/#projects" }
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            charcoal: { DEFAULT: '#2D2D2D', light: '#3D3D3D', dark: '#1A1A1A' },
            orange: { DEFAULT: '#E8731A', dark: '#C75F14', light: '#F5A623' },
            earth: { brown: '#8B6F47', tan: '#D4A96A' },
            cream: '#FAF7F2',
            sand: '#F0E6D3',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        },
      },
    }
  </script>
  <link rel="stylesheet" href="./css/custom.css">
</head>
<body class="font-sans text-charcoal bg-white overflow-x-hidden">

  <div id="header-slot"></div>

  <!-- Project Hero -->
  <section class="pt-28 pb-12 md:pt-36 md:pb-16 bg-charcoal relative overflow-hidden">
    <div class="absolute inset-0 dot-pattern opacity-5 pointer-events-none"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
      <a href="./index.html#projects" class="inline-flex items-center text-gray-400 hover:text-orange text-sm mb-6 transition-colors reveal">
        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to Projects
      </a>
      <h1 id="project-title" class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-white mb-4 reveal"></h1>
      <div class="flex flex-wrap items-center gap-3 sm:gap-4 reveal reveal-delay-1">
        <span id="project-badge" class="text-white text-xs font-semibold px-3 py-1.5 rounded"></span>
        <span class="text-gray-400 text-sm">Client: <strong id="project-client-hero" class="text-white"></strong></span>
        <span class="text-gray-400 text-sm">Year: <strong id="project-year-hero" class="text-white"></strong></span>
      </div>
    </div>
  </section>

  <!-- Project Content -->
  <section class="py-12 md:py-20 bg-cream">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">

      <!-- Project Details -->
      <div class="max-w-4xl mb-12 md:mb-16 reveal">
        <h2 class="text-2xl font-bold text-charcoal mb-4">Project Overview</h2>
        <div id="project-description"></div>
      </div>

      <!-- Project Info Grid -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 md:mb-16 reveal">
        <div class="bg-white rounded-xl p-5 text-center shadow-sm">
          <div class="text-xs text-gray-500 font-medium uppercase tracking-wide mb-1">Client</div>
          <div id="project-client" class="text-sm font-bold text-charcoal"></div>
        </div>
        <div class="bg-white rounded-xl p-5 text-center shadow-sm">
          <div class="text-xs text-gray-500 font-medium uppercase tracking-wide mb-1">Category</div>
          <div id="project-category" class="text-sm font-bold"></div>
        </div>
        <div class="bg-white rounded-xl p-5 text-center shadow-sm">
          <div class="text-xs text-gray-500 font-medium uppercase tracking-wide mb-1">Year</div>
          <div id="project-year" class="text-sm font-bold text-charcoal"></div>
        </div>
        <div class="bg-white rounded-xl p-5 text-center shadow-sm">
          <div class="text-xs text-gray-500 font-medium uppercase tracking-wide mb-1">Location</div>
          <div id="project-location" class="text-sm font-bold text-charcoal"></div>
        </div>
      </div>

      <!-- Photo & Video Gallery -->
      <div class="reveal">
        <h2 class="text-2xl font-bold text-charcoal mb-6">Project Gallery</h2>
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-4" id="gallery"></div>
        <p class="text-gray-500 text-sm mt-4 italic">Click on any image to view full size. Replace placeholder images by adding photos to the project folder.</p>
      </div>

      <!-- Navigation between projects -->
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mt-12 pt-8 border-t border-gray-200 reveal">
        <a href="./index.html#projects" class="text-charcoal hover:text-orange font-medium text-sm transition-colors flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          All Projects
        </a>
        <a href="./index.html#contact" class="bg-orange hover:bg-orange-dark text-white px-6 py-2.5 rounded-md text-sm font-semibold transition-colors">
          Enquire About This Project
        </a>
      </div>

    </div>
  </section>

  <!-- Lightbox Modal -->
  <div id="lightbox" class="fixed inset-0 z-[100] bg-charcoal-dark/95 hidden items-center justify-center" role="dialog" aria-label="Image gallery">
    <button id="lightbox-close" class="absolute top-4 right-4 z-10 w-10 h-10 flex items-center justify-center text-white/70 hover:text-white transition-colors" aria-label="Close">
      <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <button id="lightbox-prev" class="absolute left-2 sm:left-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 text-white rounded-full transition-colors" aria-label="Previous">
      <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <button id="lightbox-next" class="absolute right-2 sm:right-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center bg-white/10 hover:bg-white/20 text-white rounded-full transition-colors" aria-label="Next">
      <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
    </button>
    <div id="lightbox-content" class="max-w-5xl max-h-[85vh] mx-4 sm:mx-8 flex items-center justify-center">
      <!-- Image or video will be injected here -->
    </div>
    <div id="lightbox-counter" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/60 text-sm font-medium"></div>
  </div>

  <div id="footer-slot"></div>

  <script src="./js/projects-data.js"></script>
  <script src="./js/components.js"></script>
  <script src="./js/main.js"></script>
  <script>
    // ========== Populate project detail from data ==========
    (function() {
      const params = new URLSearchParams(window.location.search);
      const projectId = params.get('id');
      const project = projectId ? PROJECTS[projectId] : null;

      if (!project) {
        document.getElementById('project-title').textContent = 'Project Not Found';
        document.getElementById('project-description').innerHTML =
          '<p class="text-gray-600">Sorry, this project could not be found. <a href="./index.html#projects" class="text-orange hover:underline">View all projects</a>.</p>';
        return;
      }

      // Page title & meta
      document.title = project.title + ' | Gapunda Civil Construction';
      document.querySelector('meta[name="description"]').setAttribute('content', project.metaDescription);

      // Update canonical URL + BreadcrumbList schema with this project
      var projectUrl = 'https://plam1999.github.io/gapunda-civil/project.html?id=' + projectId;
      var canonical = document.querySelector('link[rel="canonical"]');
      if (!canonical) {
        canonical = document.createElement('link');
        canonical.rel = 'canonical';
        document.head.appendChild(canonical);
      }
      canonical.href = projectUrl;

      var breadcrumbEl = document.getElementById('breadcrumb-schema');
      if (breadcrumbEl) {
        breadcrumbEl.textContent = JSON.stringify({
          "@context": "https://schema.org",
          "@type": "BreadcrumbList",
          "itemListElement": [
            { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://plam1999.github.io/gapunda-civil/" },
            { "@type": "ListItem", "position": 2, "name": "Projects", "item": "https://plam1999.github.io/gapunda-civil/#projects" },
            { "@type": "ListItem", "position": 3, "name": project.title, "item": projectUrl }
          ]
        });
      }

      // Inject Project / CreativeWork structured data for this specific project
      var projectSchema = document.createElement('script');
      projectSchema.type = 'application/ld+json';
      projectSchema.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "CreativeWork",
        "name": project.title,
        "description": project.metaDescription,
        "url": projectUrl,
        "dateCreated": project.year,
        "keywords": project.category,
        "locationCreated": { "@type": "Place", "name": project.location },
        "author": { "@id": "https://plam1999.github.io/gapunda-civil/#organization" },
        "creator": { "@id": "https://plam1999.github.io/gapunda-civil/#organization" },
        "provider": { "@type": "Organization", "name": project.client }
      });
      document.head.appendChild(projectSchema);

      // Hero section
      document.getElementById('project-title').textContent = project.title;
      const badge = document.getElementById('project-badge');
      badge.textContent = project.category;
      badge.className = project.badgeColor + ' text-white text-xs font-semibold px-3 py-1.5 rounded';
      document.getElementById('project-client-hero').textContent = project.client;
      document.getElementById('project-year-hero').textContent = project.year;

      // Description paragraphs
      const descEl = document.getElementById('project-description');
      descEl.innerHTML = project.paragraphs.map(function(p, i) {
        var cls = i < project.paragraphs.length - 1
          ? 'text-gray-600 leading-relaxed mb-4'
          : 'text-gray-600 leading-relaxed';
        return '<p class="' + cls + '">' + p + '</p>';
      }).join('');

      // Info grid
      document.getElementById('project-client').textContent = project.client;
      var catEl = document.getElementById('project-category');
      catEl.textContent = project.category;
      catEl.className = 'text-sm font-bold ' + project.categoryTextColor;
      document.getElementById('project-year').textContent = project.year;
      document.getElementById('project-location').textContent = project.location;

      // Gallery — gradient patterns that vary per item
      var gradients = [
        'from-charcoal-light to-earth-brown',
        'from-earth-brown to-charcoal',
        'from-charcoal to-earth-tan',
        'from-orange-dark to-charcoal-dark',
        'from-charcoal-dark to-earth-brown',
        'from-earth-tan to-charcoal'
      ];

      var galleryEl = document.getElementById('gallery');
      galleryEl.innerHTML = project.gallery.map(function(item, i) {
        var grad = gradients[i % gradients.length];

        if (item.src) {
          // Real image / video
          if (item.type === 'video') {
            var posterAttr = item.poster ? ' poster="' + item.poster + '"' : '';
            return '<div class="gallery-item cursor-pointer group rounded-xl overflow-hidden aspect-square relative img-loading" data-index="' + i + '" data-type="video">' +
              '<video src="' + item.src + '"' + posterAttr + ' class="gallery-img w-full h-full object-cover absolute inset-0" muted preload="metadata" onloadedmetadata="this.classList.add(\'loaded\');this.parentNode.classList.remove(\'img-loading\');"></video>' +
              '<div class="absolute inset-0 flex items-center justify-center">' +
                '<div class="w-14 h-14 bg-orange/80 rounded-full flex items-center justify-center group-hover:bg-orange transition-colors duration-300">' +
                  '<svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' +
                '</div>' +
              '</div>' +
              '<div class="absolute bottom-3 left-3"><span class="bg-charcoal/70 text-white text-xs font-medium px-2 py-1 rounded">Video</span></div>' +
            '</div>';
          }
          return '<div class="gallery-item cursor-pointer group rounded-xl overflow-hidden aspect-square relative img-loading" data-index="' + i + '">' +
            '<img src="' + item.src + '" alt="' + project.title + ' — photo ' + (i+1) + '" loading="lazy" decoding="async" onload="this.classList.add(\'loaded\');this.parentNode.classList.remove(\'img-loading\');" class="gallery-img w-full h-full object-cover absolute inset-0">' +
            '<div class="absolute inset-0 bg-charcoal/0 group-hover:bg-charcoal/30 transition-all duration-300 flex items-center justify-center">' +
              '<svg class="w-8 h-8 text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>' +
            '</div>' +
          '</div>';
        }

        // Placeholder
        if (item.type === 'video') {
          return '<div class="gallery-item cursor-pointer group rounded-xl overflow-hidden aspect-square bg-gradient-to-br ' + grad + ' relative" data-index="' + i + '" data-type="video">' +
            '<div class="absolute inset-0 dot-pattern opacity-10"></div>' +
            '<div class="absolute inset-0 flex items-center justify-center">' +
              '<div class="w-14 h-14 bg-orange/80 rounded-full flex items-center justify-center group-hover:bg-orange transition-colors duration-300">' +
                '<svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>' +
              '</div>' +
            '</div>' +
            '<div class="absolute bottom-3 left-3"><span class="bg-charcoal/70 text-white text-xs font-medium px-2 py-1 rounded">Video</span></div>' +
          '</div>';
        }

        return '<div class="gallery-item cursor-pointer group rounded-xl overflow-hidden aspect-square bg-gradient-to-br ' + grad + ' relative" data-index="' + i + '">' +
          '<div class="absolute inset-0 dot-pattern opacity-10"></div>' +
          '<div class="absolute inset-0 flex items-center justify-center">' +
            '<svg class="w-10 h-10 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>' +
          '</div>' +
          '<div class="absolute inset-0 bg-charcoal/0 group-hover:bg-charcoal/30 transition-all duration-300 flex items-center justify-center">' +
            '<svg class="w-8 h-8 text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"/></svg>' +
          '</div>' +
        '</div>';
      }).join('');

    })();
  </script>
</body>
</html>
